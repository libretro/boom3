name: Testbuild for MacOS
run-name: testbuild_macos
on:
  push:
    branches:
      - 'master'
  pull_request:
    types:
      - edited
      - opened
      - synchronize
concurrency:
  # Cancel concurrent workflows for the same PR or commit hash.
  group: ${{github.workflow}}-${{github.event_name == 'pull_request' && github.head_ref || github.sha}}
  cancel-in-progress: true
jobs:
  build_macos_aarch64:
    runs-on: macos-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v6
    - name: Build (libretro Makefile)
      run: |
        make -C neo -j$(sysctl -n hw.ncpu)
        mv neo/boom3_libretro.dylib .
        make -C neo clean
        make -C neo -j$(sysctl -n hw.ncpu) D3XP=1
        mv neo/boom3_xp_libretro.dylib .
        mv boom3_libretro.dylib neo/
    - name: Stage artifact
      run: |
        export PKGDIR="boom3_libretro-macos-$(git rev-parse --short HEAD)"
        echo "pkgname=$PKGDIR" >> $GITHUB_ENV
        mkdir -p publish/$PKGDIR
        cp neo/boom3_libretro.dylib neo/boom3_xp_libretro.dylib publish/$PKGDIR/
        cp COPYING.txt publish/$PKGDIR/ 2>/dev/null || true
        echo "boom3_libretro for macOS (arm64), built $(date)" > publish/$PKGDIR/README.txt
        echo "from ${{ github.ref_name }} commit ${{ github.sha }}" >> publish/$PKGDIR/README.txt
    - name: Upload testbuild package
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.pkgname }}
        path: publish/
        if-no-files-found: error
