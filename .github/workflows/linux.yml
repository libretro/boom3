name: Testbuild for Linux
run-name: testbuild_linux
on:
  push:
    branches:
      - 'master'
  pull_request:
    types:
      - edited
      - opened
      - synchronize
concurrency:
  # Cancel concurrent workflows for the same PR or commit hash.
  group: ${{github.workflow}}-${{github.event_name == 'pull_request' && github.head_ref || github.sha}}
  cancel-in-progress: true
jobs:
  build_linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential libgl1-mesa-dev
    - name: Check out repository code
      uses: actions/checkout@v6
    - name: Build (libretro Makefile)
      run: |
        make -C neo -j$(nproc)
    - name: Stage artifact
      run: |
        export PKGDIR="boom3_libretro-linux-${{ matrix.arch }}-$(git rev-parse --short HEAD)"
        echo "pkgname=$PKGDIR" >> $GITHUB_ENV
        mkdir -p publish/$PKGDIR
        cp neo/boom3_libretro.so publish/$PKGDIR/
        cp COPYING.txt publish/$PKGDIR/ 2>/dev/null || true
        echo "boom3_libretro for ${{ matrix.arch }} Linux, built $(date)" > publish/$PKGDIR/README.txt
        echo "from ${{ github.ref_name }} commit ${{ github.sha }}" >> publish/$PKGDIR/README.txt
    - name: Upload testbuild package
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.pkgname }}
        path: publish/
        if-no-files-found: error
