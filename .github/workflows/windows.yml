name: Testbuild for Windows
run-name: testbuild_windows
on:
  push:
    branches:
      - 'master'
  pull_request:
    types:
      - edited
      - opened
      - synchronize
concurrency:
  # Cancel concurrent workflows for the same PR or commit hash.
  group: ${{github.workflow}}-${{github.event_name == 'pull_request' && github.head_ref || github.sha}}
  cancel-in-progress: true
jobs:
  build_win_x86_64_mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Set up MSYS2 (MINGW64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          make
          git
          mingw-w64-x86_64-toolchain
    - name: Check out repository code
      uses: actions/checkout@v6
    - name: Build (libretro Makefile)
      run: |
        make -C neo -j$(nproc)
        mv neo/boom3_libretro.dll .
        make -C neo clean
        make -C neo -j$(nproc) D3XP=1
        mv neo/boom3_xp_libretro.dll .
        mv boom3_libretro.dll neo/
    - name: Stage artifact
      run: |
        export PKGDIR="boom3_libretro-win64-$(git rev-parse --short HEAD)"
        echo "pkgname=$PKGDIR" >> $GITHUB_ENV
        mkdir -p publish/$PKGDIR
        cp neo/boom3_libretro.dll neo/boom3_xp_libretro.dll publish/$PKGDIR/
        cp COPYING.txt publish/$PKGDIR/ 2>/dev/null || true
        echo "boom3_libretro for x86_64 Windows (MINGW64), built $(date)" > publish/$PKGDIR/README.txt
        echo "from ${{ github.ref_name }} commit ${{ github.sha }}" >> publish/$PKGDIR/README.txt
    - name: Upload testbuild package
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.pkgname }}
        path: publish/
        if-no-files-found: error
